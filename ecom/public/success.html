<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order confirmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: Outfit, system-ui, sans-serif; background: #0b0f17; color: #e5e7eb; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { max-width: 480px; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; background: rgba(17,24,39,0.7); }
        h1 { margin: 0 0 12px; font-size: 1.5rem; }
        .muted { opacity: 0.75; margin-bottom: 20px; }
        code { word-break: break-all; font-size: 0.9rem; }
        a { color: #60a5fa; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .btn { display: inline-block; padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(96,165,250,0.5); text-decoration: none; color: #e5e7eb; background: rgba(96,165,250,0.15); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Thank you</h1>
        <p class="muted">Your payment was captured and the order was saved.</p>
        <p><strong>Order ID</strong></p>
        <p><code id="oid">—</code></p>
        <div class="row">
            <a class="btn" href="/Category%20page/Category.html">Continue shopping</a>
            <a class="btn" href="/User%20login-Register/User.html">Account</a>
        </div>
    </div>
    <script>
        document.getElementById("oid").textContent = new URLSearchParams(location.search).get("orderId") || "(missing)";
    </script>
</body>
</html>
